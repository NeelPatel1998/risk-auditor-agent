# Single API origin for the SPA: routes upload/documents → document service; chat/threads → chat service
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream document_svc {
    server document:8001;
}

upstream chat_svc {
    server chat:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 52m;

    location /upload {
        proxy_pass http://document_svc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /documents {
        proxy_pass http://document_svc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /threads {
        proxy_pass http://chat_svc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /chat {
        proxy_pass http://chat_svc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Upgrade $http_upgrade;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    location /health {
        proxy_pass http://chat_svc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # React SPA (built into gateway image) — same port as API for no CORS in demos
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

