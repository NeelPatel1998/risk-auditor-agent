name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - name: Install
        run: |
          pip install -r requirements-document.txt -r requirements-chat.txt
          pip install pytest==8.3.4 pytest-asyncio==0.25.0 ruff==0.8.4
      - name: Ruff
        run: ruff check app
      - name: Import smoke
        env:
          PYTHONPATH: .
        run: python -c "from app.main import app; from app.document_app import app as d; from app.chat_app import app as c"
      - name: Pytest
        env:
          PYTHONPATH: .
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # npm ci can fail on Linux runners when the lockfile was produced on Windows
      # and platform-specific optional deps were omitted. npm install is deterministic
      # enough for this demo CI because we also run a production build.
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Free disk space (Docker)
        run: |
          docker system prune -af
          docker builder prune -af
      - name: Docker Compose build (backend + gateway with UI)
        run: docker compose build
      - name: Compose config
        run: docker compose -f docker-compose.yml config
