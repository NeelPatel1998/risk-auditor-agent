# Continuous delivery: after CI succeeds on a push to main/master, build release images and run agent performance (eval).
# Configure secret OPENROUTER_API_KEY (+ PDFs; see README.md) for eval to execute; otherwise preflight skips with a notice.

name: CD

on:
  workflow_run:
    workflows: [CI]
    types:
      - completed

permissions:
  contents: read

jobs:
  release-images:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker Compose stack (backend + gateway with UI)
        run: docker compose build

  agent-performance:
    needs: release-images
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master')
    uses: ./.github/workflows/agent-eval-callable.yml
    secrets: inherit
    with:
      limit: "10"
